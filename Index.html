<!DOCTYPE html>
<html>
<head>
<title>SastaMart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#0d6efd;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
padding:15px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px;
margin-top:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>SastaMart Electronic Store</header>

<div class="container">

<button onclick="showLogin()">Admin Login</button>

</div>

<div class="container" id="loginBox" style="display:none">

<h3>Admin Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="container" id="adminPanel" style="display:none">

<h3>Add Product</h3>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pcod" placeholder="COD Charge">

<input type="file" id="pimg">

<button onclick="addProduct()">Add Product</button>

</div>

<div class="container">

<div class="products" id="productList"></div>

</div>

<div class="container" id="orderBox" style="display:none">

<h3>Order Form</h3>

<input id="cname" placeholder="Full Name">
<input id="cphone" placeholder="Phone Number">
<textarea id="caddress" placeholder="Full Address"></textarea>

<button onclick="submitOrder()">Place Order</button>

</div>

<script>

let adminUser="admin";
let adminPass="12345";

let products=JSON.parse(localStorage.getItem("products"))||[];

let selectedProduct="";

function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==adminUser && p==adminPass){

document.getElementById("adminPanel").style.display="block";

alert("Admin Login Success");

}else{

alert("Wrong Login");

}

}

function addProduct(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let cod=document.getElementById("pcod").value;

let file=document.getElementById("pimg").files[0];

let reader=new FileReader();

reader.onload=function(e){

let img=e.target.result;

products.push({name,price,cod,img});

localStorage.setItem("products",JSON.stringify(products));

showProducts();

};

reader.readAsDataURL(file);

}

function showProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

list.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>Price ₹${p.price}</p>

<p>COD charge ₹${p.cod}</p>

<button onclick="order('${p.name}')">Order</button>

</div>

`;

});

}

function order(product){

selectedProduct=product;

document.getElementById("orderBox").style.display="block";

}

function submitOrder(){

let name=document.getElementById("cname").value;
let phone=document.getElementById("cphone").value;
let address=document.getElementById("caddress").value;

let msg=`New Order - SastaMart

Product: ${selectedProduct}

Name: ${name}

Phone: ${phone}

Address: ${address}`;

let url="https://api.whatsapp.com/send?phone=917439127747&text="+encodeURIComponent(msg);

window.open(url,"_blank");

}

showProducts();

</script>

</body>
</html>
