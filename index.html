<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SastaMart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#2874f0;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.search{
background:white;
padding:10px;
text-align:center;
}

.search input{
width:90%;
padding:10px;
font-size:16px;
}

.categories{
display:flex;
justify-content:center;
gap:10px;
background:white;
padding:10px;
flex-wrap:wrap;
}

.categories button{
background:#2874f0;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}

button.buy{
background:#ff9f00;
border:none;
padding:8px;
margin-top:5px;
color:white;
border-radius:5px;
}

button.cart{
background:#fb641b;
border:none;
padding:8px;
margin-top:5px;
color:white;
border-radius:5px;
}

.cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#2874f0;
color:white;
padding:10px;
text-align:center;
}

.orderForm{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

.orderForm input,select{
width:95%;
padding:10px;
margin:5px;
}

</style>
</head>

<body>

<header>SastaMart Electronic Store</header>

<div class="search">
<input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('airpods')">AirPods</button>
<button onclick="filterCategory('watch')">Watch</button>
<button onclick="filterCategory('speaker')">Speaker</button>
</div>

<div class="products" id="products">

<div class="card" data-category="airpods">
<img src="https://i.imgur.com/0E6zG5R.jpg">
<h4>AirPods Pro</h4>
<p class="price">₹999</p>
<button class="buy" onclick="buy('AirPods Pro')">Buy Now</button>
</div>

<div class="card" data-category="watch">
<img src="https://i.imgur.com/YV4pZ4F.jpg">
<h4>Smart Watch</h4>
<p class="price">₹799</p>
<button class="buy" onclick="buy('Smart Watch')">Buy Now</button>
</div>

<div class="card" data-category="speaker">
<img src="https://i.imgur.com/6Iej2c3.jpg">
<h4>Bluetooth Speaker</h4>
<p class="price">₹599</p>
<button class="buy" onclick="buy('Bluetooth Speaker')">Buy Now</button>
</div>

</div>

<div class="orderForm" id="orderForm">

<h3>Order Details</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Address">
<select id="payment">
<option>Cash on Delivery</option>
<option>Prepaid</option>
</select>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

var selectedProduct="";

function buy(product){

selectedProduct=product;

document.getElementById("orderForm").style.display="block";

}

function placeOrder(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;
var payment=document.getElementById("payment").value;

var msg="Order:%0AProduct: "+selectedProduct+
"%0AName: "+name+
"%0APhone: "+phone+
"%0AAddress: "+address+
"%0APayment: "+payment;

var url="https://wa.me/917439127747?text="+msg;

window.open(url);

}

function searchProduct(text){

text=text.toLowerCase();

var cards=document.querySelectorAll(".card");

cards.forEach(c=>{

if(c.innerText.toLowerCase().includes(text))
c.style.display="block";

else
c.style.display="none";

});

}

function filterCategory(cat){

var cards=document.querySelectorAll(".card");

cards.forEach(c=>{

if(cat==="all")
c.style.display="block";

else if(c.dataset.category===cat)
c.style.display="block";

else
c.style.display="none";

});

}

</script>

</body>
</html>
